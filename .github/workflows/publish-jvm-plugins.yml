name: Publish JVM plugins

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without a leading v"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish plugins to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "UIKA_VERSION=$version" >> "$GITHUB_ENV"

      - name: Publish Gradle plugin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise exec -- gradle -p gradle-plugin publish -PuikaVersion="$UIKA_VERSION"

      - name: Publish sbt plugin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sbt-plugin
          mise exec -- sbt -Dsbt.supershell=false -batch \
            "set ThisBuild / version := \"$UIKA_VERSION\"" \
            publish

      - name: Publish Maven plugin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise exec -- mvn -f maven-plugin/pom.xml -B versions:set \
            -DnewVersion="$UIKA_VERSION" -DgenerateBackupPoms=false
          mise exec -- mvn -f maven-plugin/pom.xml -B -s .github/maven-settings.xml \
            deploy -DskipTests
