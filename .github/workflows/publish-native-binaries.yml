name: Publish native binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without a leading v"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.classifier }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            classifier: linux-x86_64
            binary: uika
          - os: macos-14
            classifier: macos-aarch64
            binary: uika
          - os: macos-13
            classifier: macos-x86_64
            binary: uika
          - os: windows-latest
            classifier: windows-x86_64
            binary: uika.exe

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "UIKA_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          classifier="${{ matrix.classifier }}"
          staging="dist/native/$classifier/uika-${UIKA_VERSION}-$classifier"
          mkdir -p "$staging"
          cp "target/release/${{ matrix.binary }}" "$staging/uika"
          chmod 0755 "$staging/uika"
          (cd "dist/native/$classifier" && zip -r "uika-${UIKA_VERSION}-$classifier.zip" "uika-${UIKA_VERSION}-$classifier")

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $classifier = "${{ matrix.classifier }}"
          $staging = "dist/native/$classifier/uika-$env:UIKA_VERSION-$classifier"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "$staging/uika.exe"
          Compress-Archive -Path $staging -DestinationPath "dist/native/$classifier/uika-$env:UIKA_VERSION-$classifier.zip" -Force

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.classifier }}
          path: dist/native/${{ matrix.classifier }}/*.zip
          if-no-files-found: error

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "UIKA_VERSION=$version" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: dist/native
          merge-multiple: false

      - name: Normalize artifact layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/native/{linux-x86_64,macos-aarch64,macos-x86_64,windows-x86_64}
          for classifier in linux-x86_64 macos-aarch64 macos-x86_64 windows-x86_64; do
            found="$(find "dist/native/native-$classifier" -name "uika-${UIKA_VERSION}-$classifier.zip" -print -quit)"
            test -n "$found"
            cp "$found" "dist/native/$classifier/"
          done

      - name: Publish Maven package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise exec -- gradle -p binary-publishing publish -PuikaVersion="$UIKA_VERSION"
