name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle-plugin/**/*.gradle*', 'gradle-plugin/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache sbt
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /tmp/uika-sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('sbt-plugin/build.sbt', 'sbt-plugin/project/build.properties') }}
          restore-keys: |
            sbt-${{ runner.os }}-

      - name: Cache Maven
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('maven-plugin/pom.xml', 'maven-plugin/src/it/**/*.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Check
        run: make check

      - name: Validate binary publishing build
        run: mise exec -- gradle -p binary-publishing help -PuikaVersion=0.0.0-ci
